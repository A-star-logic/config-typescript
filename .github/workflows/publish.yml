run-name: Publish to NpmJS

permissions:
  contents: read

on:
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        uses: ./.github/actions/prepare

      - name: Version check
        run: yarn verify

      - name: Build
        run: yarn build

      - name: Publish
        run: npm publish --provenance --access public
